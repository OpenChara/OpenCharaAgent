<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- OpenCharaAgent macOS app icon: a flat luna moth silhouetted against the full
       moon, moonlit-blue brand palette (#6DB3E0 family from front/art.py).
       Apple icon grid: 824x824 squircle centered on a 1024 canvas.
       The left half is drawn once and mirrored about x=512; the whole moth is
       tilted a few degrees so it reads as a creature in flight, not a face. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7FBDE6"/>
      <stop offset="100%" stop-color="#3B7CB6"/>
    </linearGradient>
    <clipPath id="plate">
      <rect x="100" y="100" width="824" height="824" rx="185"/>
    </clipPath>
    <g id="halfmoth3">
      <!-- antenna: a thin crescent sliver curving up-outward -->
      <path fill="#1F4E7E" d="M 506 402
               C 490 360 470 328 442 308
               C 470 318 496 352 510 394 Z"/>
      <!-- forewing: swept up-outward, near-straight costal edge, soft tip -->
      <path fill="#1F4E7E" d="M 507 436
               C 460 408 380 360 318 342
               C 290 334 276 344 280 366
               C 288 412 330 472 394 508
               C 442 535 486 542 504 532 Z"/>
      <!-- hindwing: oval lobe whose outer margin flows into the luna tail,
           kept clear of the abdomen so moonlight shows through -->
      <path fill="#1F4E7E" d="M 503 542
               C 455 538 400 556 386 596
               C 372 634 392 666 424 672
               C 420 716 426 756 444 788
               C 450 798 462 796 464 784
               C 470 730 476 670 486 626
               C 492 596 500 560 503 548 Z"/>
      <!-- small ring eyespots, one per wing (ornament, not eyes) -->
      <circle cx="376" cy="424" r="17" fill="#F2FAFF"/>
      <circle cx="376" cy="424" r="7" fill="#1F4E7E"/>
      <circle cx="428" cy="606" r="12" fill="#F2FAFF"/>
    </g>
  </defs>

  <g clip-path="url(#plate)">
    <!-- night-blue sky -->
    <rect x="100" y="100" width="824" height="824" fill="url(#sky)"/>

    <!-- a few stars in the night sky -->
    <g fill="#F2FAFF">
      <circle cx="232" cy="240" r="7" opacity=".85"/>
      <circle cx="306" cy="180" r="4" opacity=".55"/>
      <circle cx="804" cy="262" r="6" opacity=".8"/>
      <circle cx="852" cy="356" r="4" opacity=".5"/>
      <circle cx="186" cy="430" r="4" opacity=".45"/>
      <circle cx="760" cy="170" r="4" opacity=".5"/>
    </g>

    <!-- the full moon, with the faintest hint of maria -->
    <circle cx="512" cy="510" r="295" fill="#F2FAFF"/>
    <circle cx="512" cy="510" r="295" fill="none" stroke="#FFFFFF" stroke-width="6" opacity=".6"/>
    <g fill="#6DB3E0" opacity=".12">
      <circle cx="640" cy="396" r="64"/>
      <circle cx="396" cy="660" r="84"/>
      <circle cx="700" cy="640" r="46"/>
    </g>

    <!-- the moth, tilted in flight -->
    <g transform="rotate(-8 512 530)">
      <use href="#halfmoth3"/>
      <use href="#halfmoth3" transform="matrix(-1,0,0,1,1024,0)"/>
      <!-- body: head + tapered abdomen -->
      <path fill="#1F4E7E" d="M 512 404
               C 530 404 538 426 537 458
               C 536 510 526 562 512 588
               C 498 562 488 510 487 458
               C 486 426 494 404 512 404 Z"/>
      <circle cx="512" cy="404" r="19" fill="#1F4E7E"/>
    </g>
  </g>
</svg>
