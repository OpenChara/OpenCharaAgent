name: CI

# Runs the quality gates the project already relies on but previously only ran
# by hand: the Python suite, ruff (the pyflakes-class checks), the AST-enforced
# architecture boundaries (tests/test_architecture.py runs as part of pytest),
# and the frontend typecheck + vitest. This matters most because the layering is
# enforced by a TEST — without CI, a multi-author repo can break a boundary and
# never notice until someone runs pytest locally.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Python (ruff + pytest + architecture)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync (dev + server extras)
        run: uv sync --extra dev --extra server
      - name: Ruff (pyflakes-class checks)
        run: uvx ruff check --select F src/lunamoth tests
      - name: Pytest (incl. test_architecture.py boundary guard)
        run: uv run python -m pytest -q

  backend-macos:
    name: Python on macOS (Seatbelt + PTY jail paths)
    # The project is "macOS first," and the strongest jail tests (sandbox-exec
    # read-confinement, the PTY paths) are platform-gated and SKIP on Linux — so
    # green Linux CI did not actually verify them. This job runs the suite on
    # macOS so those paths are exercised on their native OS.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync (dev + server extras)
        run: uv sync --extra dev --extra server
      - name: Pytest (Seatbelt/PTY jail tests run here, not on Linux)
        run: uv run python -m pytest -q

  frontend:
    name: Web (tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint (eslint — fails on errors)
        run: npm run lint
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: Unit tests (vitest)
        run: npm run test
