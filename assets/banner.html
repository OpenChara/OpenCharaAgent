<!DOCTYPE html>
<!-- OpenCharaAgent GitHub banner source. Two steps:
     1) render with headless Chrome:
        chrome --headless --screenshot=banner.png --window-size=1280,320 \
               --force-device-scale-factor=2 file://.../banner.html
     2) convert the (untracked) banner.png to the SHIPPED assets/banner.webp —
        PNG is the wrong container for this photographic art (~2MB); WebP q82
        lands around a tenth of that:
        uv run --no-project --with pillow python -c "from PIL import Image; \
          Image.open('banner.png').save('banner.webp', quality=82, method=6)"
     Fonts are macOS system serifs (Didot / Hoefler Text) — render on macOS.

     The wordmark and sigil stay live text/SVG here; only the background
     is art. banner-art.png is cropped from the generated banner-art.src.png
     (1672x941): the image model letterboxed its own output, so the content band
     (y 278..726) is cut out and padded back to 3.2:1 at 2560x800; the 1280x320
     (4:1) canvas `cover`-crops it vertically, trimming mostly that padding.
     X-coordinates are unchanged by the crop — the room's structure ends at
     x≈277@1x and the art's first glowing moth starts at x≈1110@1x; the lockup
     must clear both, which at this type size forces it slightly RIGHT of true
     center (the art is left-heavy, so the offset reads as balance, not error).
     Art direction, if the art is ever regenerated: the figure must be a
     faceless silhouette seen from behind, absorbed in its own work — the
     product is the user's OC, so the banner must not pin a specific character,
     and a character that looked back at the viewer would say the opposite of
     what this runtime is for. -->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 320px; overflow: hidden; }
  body {
    position: relative;
    /* Layers, topmost first: a faint glow lifting the wordmark off the art, a wide
       soft darkening pooled behind the lockup so the type sits on a quiet field,
       a scrim holding the top and bottom edges down, then the art itself.
       banner-art.png is pre-cropped to exactly 1280x400@2x; the lit room (left)
       and glowing moths (right) are meant to survive as quiet accents. */
    background:
      radial-gradient(ellipse 900px 520px at 50% 46%, rgba(110, 170, 220, .10), rgba(110, 170, 220, 0) 68%),
      radial-gradient(ellipse 1080px 300px at 53% 50%, rgba(7, 16, 27, .55), rgba(7, 16, 27, 0) 74%),
      linear-gradient(180deg, rgba(10, 23, 38, .65) 0%, rgba(10, 23, 38, 0) 34%,
                              rgba(10, 23, 38, 0) 66%, rgba(10, 23, 38, .65) 100%),
      url("banner-art.png") center / cover no-repeat;
    background-color: #0a1726;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* the horizontal lockup: sigil left of the wordmark, centered on its cap height */
  .lockup {
    display: flex;
    align-items: center;
    gap: 26px;
    /* shifted right of true center: the room (left) caps the lockup's left edge
       at x≈292 and the art moths cap the right at x≈1095 — at this type size a
       centered lockup would sit on the room, and the left-heavy art makes the
       offset read as balance */
    margin-left: 104px;
  }

  /* the moth sigil (solid silhouette) */
  .sigil { width: 66px; opacity: .96;
           /* optically center against the caps: the h1 line box extends below the
              baseline for descenders the name barely uses */
           transform: translateY(-4px);
           filter: drop-shadow(0 0 18px rgba(160, 210, 245, .55)); }

  h1 {
    font-family: "Didot", "Hoefler Text", serif;
    font-weight: 400;
    font-size: 84px;
    /* generous line box: at 1.04 the Didot "g" descender fell outside the h1 box
       and background-clip:text painted nothing there — the glyph came out clipped */
    line-height: 1.4;
    letter-spacing: .015em;
    background: linear-gradient(180deg, #ffffff 30%, #a8cfec 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 64px rgba(140, 195, 240, .35);
  }

</style>
</head>
<body>
  <div class="lockup">
    <!-- the moth sigil: solid-silhouette variant of apps/desktop/assets/icon.svg
         (no eyespots), matching apps/web BrandLoader; moonlight white -->
    <svg class="sigil" viewBox="240 270 544 560" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <g id="half">
          <path d="M 506 402 C 490 360 470 328 442 308 C 470 318 496 352 510 394 Z"/>
          <path d="M 507 436 C 460 408 380 360 318 342 C 290 334 276 344 280 366
                   C 288 412 330 472 394 508 C 442 535 486 542 504 532 Z"/>
          <path d="M 503 542 C 455 538 400 556 386 596 C 372 634 392 666 424 672
                   C 420 716 426 756 444 788 C 450 798 462 796 464 784
                   C 470 730 476 670 486 626 C 492 596 500 560 503 548 Z"/>
        </g>
      </defs>
      <g fill="#dcebfa" transform="rotate(-8 512 530)">
        <use href="#half"/>
        <use href="#half" transform="matrix(-1,0,0,1,1024,0)"/>
        <path d="M 512 404 C 530 404 538 426 537 458 C 536 510 526 562 512 588
                 C 498 562 488 510 487 458 C 486 426 494 404 512 404 Z"/>
        <circle cx="512" cy="404" r="19"/>
      </g>
    </svg>

    <h1>OpenCharaAgent</h1>
  </div>

</body>
</html>
